# 로컬 개발용 Postgres.
# 운영 전환 시 사내 AWS DB로 DATABASE_URL만 교체.
services:
  postgres:
    image: postgres:16-alpine
    container_name: chargev-pg
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: chargev
    volumes:
      - chargev-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chargev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chargev-pg-data:
